<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Basic Tennis Game</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top, #3b7dd8 0%, #04152d 70%);
      color: #eef6ff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: min(980px, 100%);
      padding: 24px;
      box-sizing: border-box;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 2.4rem;
      text-align: center;
      letter-spacing: 0.04em;
    }

    p {
      margin: 0 0 22px;
      text-align: center;
      color: #c9dfff;
    }

    .panel {
      background: rgba(5, 19, 45, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.25);
    }

    canvas {
      width: 100%;
      height: auto;
      border-radius: 18px;
      background: linear-gradient(180deg, #0d2a52 0%, #06152d 100%);
      display: block;
      margin-bottom: 18px;
    }

    .scoreboard {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 18px;
      font-size: 2.2rem;
      margin-bottom: 14px;
      color: #fffae8;
    }

    .message {
      text-align: center;
      color: #a8c9ff;
      margin-bottom: 16px;
      min-height: 24px;
    }

    button {
      display: block;
      margin: 0 auto;
      background: #68a0ff;
      color: #072343;
      border: none;
      border-radius: 12px;
      padding: 14px 28px;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    button:hover {
      transform: translateY(-2px);
      background: #4f82d6;
    }

    .controls-note {
      text-align: center;
      color: #cfdfff;
      margin-top: 14px;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Basic Tennis Game</h1>
    <p>Use W/S to move the left paddle. Press Space to serve. First to 5 points wins.</p>

    <div class="panel">
      <canvas id="gameCanvas" width="960" height="520"></canvas>
      <div class="scoreboard"><span id="playerScore">0</span> - <span id="aiScore">0</span></div>
      <div id="message" class="message">Press Space to serve.</div>
      <button id="restartButton">Restart Game</button>
      <div class="controls-note">Controls: W up | S down | Space serve</div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
